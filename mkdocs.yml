site_name: Market Risk BI Training
site_description: A beginner-to-pro training on Market Risk for BI and Data professionals
site_author: Marcos
repo_url: https://github.com/movmarcos/MarketRiskBITraining
repo_name: movmarcos/MarketRiskBITraining
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.prune
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["docs"]
      check_paths: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - footnotes
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Curriculum Overview: curriculum.md
  - Phase 1 — Foundations:
      - modules/01-market-risk-foundations.md
      - modules/02-securities-firm-organization.md
      - modules/03-trade-lifecycle.md
      - modules/04-financial-instruments.md
  - Phase 2 — Data Modeling Core:
      - modules/05-dimensional-modeling.md
      - modules/06-core-dimensions.md
      - modules/07-fact-tables.md
  - Phase 3 — Risk Measures:
      - modules/08-sensitivities.md
      - modules/09-value-at-risk.md
      - modules/10-stress-testing.md
  - Phase 4 — Cross-Cutting Concepts:
      - modules/11-market-data.md
      - modules/12-aggregation-additivity.md
      - modules/13-time-bitemporality.md
      - modules/14-pnl-attribution.md
  - Phase 5 — Engineering Excellence:
      - modules/15-data-quality.md
      - modules/16-lineage-auditability.md
      - modules/17-performance-materialization.md
      - modules/18-architecture-patterns.md
  - Phase 6 — Business-Aligned Pro:
      - modules/19-regulatory-context.md
      - modules/20-working-with-business.md
      - modules/21-antipatterns.md
  - Phase 7 — Capstone:
      - modules/22-capstone.md
  - Phase 8 — Vendor Systems (applied):
      - modules/23-vendor-systems-framework.md
      - modules/24-murex-applied.md
      - modules/25-polypaths-applied.md
  - Glossary: glossary.md
